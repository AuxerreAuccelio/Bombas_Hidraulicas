<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="body_consulta">
    
    <header>
      <div class="titulo_h1">
        <div class="subtitulo_h1">
          <h1>Sistema Hidráulica Pro</h1>
        </div>

        <div class="consulta_header">
          <a href="bemvindo.html">
            <button class="btn_consulta">Sair</button>
          </a>
        </div>
      </div>
    </header>

    <div class="main">
      <div class="consulta_main">
        <button class="btn_consulta_menu">Consultar Produto</button>
      </div>

      <div class="titulo_consulta">
        <div class="box_consulta">
          <h1>Consulta de Bombas</h1>

          <div class="unich">
            <div class="formulario">
              <form id="form_consulta">
                <input type="text" id="consulta" placeholder="Digite o ID da bomba"/>

                <button class="consultar" type="submit">Consultar</button>

                <section class="dados_bomba">
                    <img src="" id="imagem_consulta">
                    <p id="nome"></p>
                    <p id="cat"></p>
                    <p id="valor"></p>
                </section>
              </form>
            </div>
          </div>

          <p id="erro_consulta"></p>
        </div>
      </div>
    </div>

    <script src="./hidraulica.js"></script>
  </body>
</html>
