<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="body_contato">
    
    <header>
      <div class="botoes">
        <div class="logo">
          <img src="./4.jpeg" alt="Logo" />
        </div>
        <div class="nav_links">
          <div class="home">
            <a href="index.html">
              <button class="btn_home">Home</button>
              <!-- active -->
            </a>
          </div>
          <div class="sobre">
            <a href="sobre.html">
              <button class="btn_sobre">Sobre</button>
              <!-- active -->
            </a>
          </div>
          <div class="contato">
            <a href="contato.html">
              <button class="btn_contato">Contato</button>
              <!-- active -->
            </a>
          </div>
          <div class="login">
            <a href="login.html">
              <button class="btn_login">Login</button>
              <!-- active -->
            </a>
          </div>
        </div>
      </div>
    </header>
    
    <div class="unique">
      
        <div class="titulo_contato">
            <h1>Fale Conosco</h1>
        </div>
      
        <div class="formulario">
            <form action="" id="form_contato">
                <div class="Nome">
                    <label for=""></label>
                    <input type="text" id="nome" placeholder="Seu nome" />
                </div>
            
                <div class="Email">
                    <label for=""></label>
                    <input type="text" id="email" placeholder="Seu E-mail" />
                </div>
            
                <div class="Area">
                    <label for=""></label>
                    <textarea name="mensagem" id="area" placeholder="Como podemos ajudar?"> </textarea>
                </div>
            
                <button class="enviar" type="submit">Enviar Mensagem</button>
            </form>
        
        </div>
    </div>

    <footer>
      <div class="copyright">
        <p>&copy; 2026 Hidráulica Pro - Todos os direitos reservados.</p>
      </div>
    </footer>

    <script src="./hidraulica.js"></script>
  </body>
</html>
